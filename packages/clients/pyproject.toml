[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ibm-watsonx-orchestrate-clients"
dynamic = ["version"]
description = "IBM watsonx Orchestrate ADK API Client Library"
authors = [
    { name = "IBM", email = "support@ibm.com" }
]
#readme = { file = "README.md", content-type = 'text/markdown'}
license = {text = "MIT License"}
license-files = ["LICENSE"]
requires-python = ">=3.11, <3.14"
dependencies = [
    "ibm-cloud-sdk-core>=3.24.2",
    "ibm-watsonx-orchestrate-core"
]

[tool.setuptools]
metadata_hook = "setuptools_hook:set_main_metadata"

[tool.hatch.build.targets.wheel]
packages = ["."]
package-data = true

[tool.hatch.build]
include = [
    "./*"
]
directory="../../dist"

[tool.hatch.version]
path = "../../src/ibm_watsonx_orchestrate/__init__.py"
validate-bump=false

[project.scripts]
ibm-watsonx-orchestrate-mcp-server = "ibm_watsonx_orchestrate_mcp_server.server:start_server"