openapi: 3.0.3
info:
  title: JSONPlaceholder Users API
  version: '1.0'
  description: Free fake REST API for testing - Get user information
servers:
  - url: https://jsonplaceholder.typicode.com
paths:
  /users/{id}:
    get:
      operationId: getUserById
      summary: Get user by ID
      description: Retrieves user information by user ID from JSONPlaceholder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 10
          description: User ID (1-10)
      responses:
        '200':
          description: User information retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: User ID
                  name:
                    type: string
                    description: User's full name
                  username:
                    type: string
                    description: Username
                  email:
                    type: string
                    description: Email address (can be masked)
                  phone:
                    type: string
                    description: Phone number (can be masked)
                  website:
                    type: string
                    description: Website URL
                  address:
                    type: object
                    properties:
                      street:
                        type: string
                      suite:
                        type: string
                      city:
                        type: string
                      zipcode:
                        type: string
                      geo:
                        type: object
                        properties:
                          lat:
                            type: string
                          lng:
                            type: string
                  company:
                    type: object
                    properties:
                      name:
                        type: string
                      catchPhrase:
                        type: string
                      bs:
                        type: string

