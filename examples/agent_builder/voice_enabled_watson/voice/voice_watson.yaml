# Simple example with minimal fields for proper functionality

name: watson_voice_config
speech_to_text:
  provider: watson_stt
  watson_stt_config: 
    api_url: "example-stt-url"
    api_key: "example-stt-key"
    model: "example model" # "en-US"
text_to_speech:
  provider: watson_tts
  watson_tts_config: 
    api_url: "example-tts-url"
    api_key: "example-tts-key"
    voice: "example voice" # "en-US_EllieNatural"
language: "en-US"
