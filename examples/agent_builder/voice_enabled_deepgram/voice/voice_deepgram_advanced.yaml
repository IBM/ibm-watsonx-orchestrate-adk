# Advanced example with all advanced optional fields

name: deepgram_voice_config
llm_aggregation_timeout_seconds: 0.8  # Optional: Maximum time to wait for additional transcription content
speech_to_text:
  provider: deepgram_stt
  deepgram_stt_config:
    api_url: "wss://api.deepgram.com/v1/listen"  # Required
    api_key: "your-deepgram-api-key"  # Required
    model: "nova-3"  # Required, e.g. nova-2, nova-3
    keyterm: ["help", "search", "Mr. Smith"]  # Optional: list of keywords to boost recognition. Only supported for nova-3 models.
    mip_opt_out: false  # Optional: opt out of model improvement program
    channels: 1  # Optional: Number of audio channels
    diarize: true  # Optional: Enable speaker diarization
    dictation: false  # Optional: Enable dictation mode
    endpointing: 10  # Optional: Endpointing silence duration in seconds
    extra: null  # Optional: Extra parameters to pass to Deepgram (e.g. ["custom_param1:value1", "custom_param2:value2"])
    interim_results: true  # Optional: Enable interim results
    keywords: null  # Optional: Keywords to detect for boost or suppression; only supported for nova-2 models. (e.g. ["snuffleupagus:5", "monster", "cookie:-2"])
    language: "en-US"  # Optional: BCP-47 language tag
    multichannel: false  # Optional: Transcribe each audio channel independently
    numerals: true  # Optional: convert numbers to numerals
    profanity_filter: false  # Optional: Filter profanity
    punctuate: true  # Optional: Add punctuation and capitalization
    redact: null  # Optional: Redact sensitive information (e.g., ["pci", "pii"])
    replace: ["apple:orange", "orange:apple"]  # Optional: Replace specified terms
    search: ["action item", "follow up"]  # Optional: Search for specific terms
    smart_format: true  # Optional: Apply smart formatting to the transcript
    tag: ["customer_service", "sales_call"]  # Optional: Tag for the request
    utterance_end_ms: 1000  # Optional: How long Deepgram will wait to send UtteranceEnd message
    vad_events: true  # Optional: Enable Deepgram's voice activity detection events
    version: "latest"  # Optional: API version
    
    # v2/listen endpoint parameters
    eager_eot_threshold: null  # Optional: End-of-turn confidence for eager EOT (0.3-0.9)
    eot_threshold: null  # Optional: End-of-turn confidence to finish turn (0.5-0.9)
    eot_timeout_ms: null  # Optional: Time (ms) after speech to finish turn regardless of EOT confidence

text_to_speech:
  provider: deepgram_tts
  deepgram_tts_config:
    api_key: "your-deepgram-api-key"  # Required
    api_url: "https://api.deepgram.com"  # Optional: Deepgram TTS API URL
    language: "en"  # Optional
    model: "example model"  # Optional, e.g. aura-2-thalia-en
    mip_opt_out: false  # Optional: opt out of model improvement program
language: "en-us"  # Optional: default language (default: en-us)


# Optional top-level voice configuration advanced settings
# Voice Activity Detection (VAD)
vad:
  enabled: true  # Enable Voice Activity Detection, default is true
  provider: "silero_vad"
  silero_vad_config:
    confidence: 0.7  # The confidence threshold for speech detection (between 0.0 and 1.0), default is 0.7
    start_seconds: 0.2  # The time in seconds speech must be detected before transitioning to SPEAKING state, default is 0.2
    stop_seconds: 0.8  # The time in seconds silence must be detected before transitioning to QUIET state, default is 0.8
    min_volume: 0.6  # The minimum audio volume threshold for speech detection (between 0.0 and 1.0), default is 0.6

# Dual-Tone Multi-Frequency (DTMF)
dtmf_input:
  inter_digit_timeout_ms: 2500  # The amount of time (ms) to wait for a new DTMF digit, default is 2500 ms
  termination_key: "#"  # The DTMF termination key that signals the end of DTMF input
  maximum_count: 10  # Maximum number of digits a user can enter
  ignore_speech: true  # Disable speech recognition during collection of DTMF digits, default is true

# User Idle Handler
user_idle_handler:
  enabled: true  # Enable idle handling. If false, we disconnect on timeout without playing a prompt
  idle_timeout: 7  # Idle timeout in seconds before triggering the handler (default 7s)
  idle_max_reprompts: 2  # How many times to replay before ending the session (0 = end immediately)
  idle_timeout_message: "Are you still there? Please let me know if you need any help."  # Message to play on idle; language-specific variants may override this
  idle_hangup_message: ""  # Final message to play before disconnecting after idle reprompts are exhausted
  
# Agent Idle Handler (Audio Cues & Hold Music)
agent_idle_handler:
  typing_enabled: true  # Enable typing indicator
  typing_duration_seconds: 5  # Duration of typing indicator in seconds (0-30)
  audio_clip_id: "guitar_1"  # Audio clip to play during hold
  hold_audio_seconds: 15  # Duration of hold audio in seconds (0-120)
  pre_hold_message: "We're taking a little extra time but we'll be with you shortly. Thanks for your patience!"  # The text to play for the user before playing on-hold audio
  hold_message: "Your request is in progress. It might take a little time, but we assure you that the result will be worth the wait."  # The text to play to the user periodically while on hold
