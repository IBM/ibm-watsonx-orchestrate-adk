# Simple example with minimal fields for proper functionality

name: deepgram_voice_config
speech_to_text:
  provider: deepgram_stt
  deepgram_stt_config:
    api_url: "Deepram-api-url" # "wss://api.deepgram.com/v1/listen"
    api_key: "your-deepgram-api-key"
    model: "example model" # "nova-2"
text_to_speech:
  provider: deepgram_tts
  deepgram_tts_config:
    api_key: "your-deepgram-api-key"
